name: CI

on:
  push:
  pull_request:

jobs:
  security-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --ignore-scripts

      - name: Security Smoke
        env:
          JWT_SECRET: ci-smoke-secret
        run: npm run test:security
